<div class="layout">
  <div class="sidebar-backdrop" [class.sidebar-backdrop-visible]="showBackdrop()" (click)="closeSidebar()"></div>

  <aside class="sidebar sidebar-open" [class.sidebar-open]="sidebarOpen()"
    [class.sidebar-animating]="sidebarAnimating()" (transitionend)="onSidebarTransitionEnd($event)">

    <a routerLink="/dashboard" aria-label="MotionHive home">
      <mh-logo />
    </a>

    <nav class="flex-1">
      <ul class="flex flex-col gap-2">
        @for (item of menuItems(); track (item.routerLink ?? item.label)) {
        @if (item.separator) {
        <li class="px-3 pt-3 pb-1 text-xs font-semibold uppercase tracking-wider text-surface-400">
          {{ item.label }}
        </li>
        } @else {
        <li>
          <a [routerLink]="item.routerLink" routerLinkActive="bg-primary-500 text-primary-contrast font-semibold" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm
                transition-colors hover:bg-surface-300 hover:text-surface-800">
            <i [class]="item.icon + ' text-base'"></i>
            {{ item.label }}
          </a>
        </li>
        }
        }
      </ul>
    </nav>

    <p-button label="Share feedback" icon="pi pi-comment" text fluid styleClass="justify-start"
      (onClick)="openFeedback()" />

  </aside>

  <div class="content" [class.sidebar-open]="sidebarOpen()">
    <p-toolbar>
      <ng-template #start>
        <p-button icon="pi pi-bars" class="mr-2" size="small" text rounded (onClick)="toggleSidebar()" />
      </ng-template>
      <ng-template #center>
        <ng-content select="[toolbarCenter]" />
      </ng-template>
      <ng-template #end>
        <div class="flex items-center gap-4">
          <ng-content select="[toolbarEnd]" />
          <mh-theme-toggle />
          <mh-profile-menu />
        </div>
      </ng-template>
    </p-toolbar>

    <main class="flex flex-col flex-1 p-4 overflow-auto">
      <ng-content />
    </main>
  </div>
</div>
