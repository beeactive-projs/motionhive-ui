<div
  class="rounded-lg border border-surface-200 dark:border-surface-700 bg-surface-0 dark:bg-surface-900/60 p-3 flex flex-col gap-2"
  [class]="accentClass()"
  [class.cursor-pointer]="clickable()"
  [class.hover:border-surface-300]="clickable()"
  [class.dark:hover:border-surface-600]="clickable()"
  [class.transition-colors]="clickable()"
>
  <!-- Top row: status pill + optional badges -->
  <div class="flex items-center gap-2 flex-wrap">
    @if (status(); as s) {
      <p-tag [value]="s" [severity]="statusSeverity()" class="text-xs!" />
    }
    <ng-content select="[badges]" />
  </div>

  <!-- Middle row: avatar + title/subtitle, amount on the right -->
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-start gap-3 min-w-0 flex-1">
      <p-avatar
        [label]="avatarInitials() ?? undefined"
        [icon]="avatarInitials() ? undefined : avatarIcon()"
        shape="circle"
        styleClass="bg-primary-500/10 text-primary-700 dark:text-primary-400 font-semibold shrink-0"
      />
      <div class="flex flex-col min-w-0 gap-0.5 pt-0.5">
        <span class="text-sm font-semibold truncate">{{ title() }}</span>
        @if (subtitle(); as sub) {
          <span class="text-xs text-surface-500 truncate">{{ sub }}</span>
        }
      </div>
    </div>
    <div class="shrink-0 text-right">
      <ng-content select="[amount]" />
    </div>
  </div>

  <!-- Optional meta row (small sub-info line) -->
  <ng-content select="[meta]" />

  <!-- Optional actions row -->
  <ng-content select="[actions]" />
</div>
