<div class="flex items-center gap-3">
  @if (hex()) {
    <mh-hex-avatar [user]="user()" [size]="hexSize()" />
  } @else {
    <mh-avatar [user]="user()" [styleClass]="avatarStyleClass()" />
  }
  <div class="min-w-0">
    @if (_hasHandle()) {
      <a [routerLink]="'/@' + user()!.handle" class="font-medium text-primary-500 hover:underline leading-none">{{ _displayName() }}</a>
    } @else {
      <span class="font-medium truncate block">{{ _displayName() }}</span>
    }
    @if (showEmail() && user()?.email) {
      <p class="text-xs text-muted-color mt-0.5 mb-0 truncate">{{ user()!.email }}</p>
    }
  </div>
</div>
