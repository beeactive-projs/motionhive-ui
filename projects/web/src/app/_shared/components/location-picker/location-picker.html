@if (location(); as loc) {
  <div
    class="flex items-center gap-2 rounded-md border border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-900 px-3 py-2"
  >
    <i class="pi pi-map-marker text-primary-600 text-sm"></i>
    <span class="flex-1 text-sm font-medium truncate" [title]="format(loc)">
      {{ format(loc) }}
    </span>
    @if (!disabled()) {
      <p-button
        label="Change"
        severity="secondary"
        [text]="true"
        size="small"
        (onClick)="clear()"
      />
    } @else {
      <i class="pi pi-lock text-surface-400 text-sm" aria-label="Locked"></i>
    }
  </div>
} @else if (disabled()) {
  <div class="flex items-center gap-2 rounded-md border border-surface-200 dark:border-surface-700 bg-surface-50 dark:bg-surface-900 px-3 py-2 text-sm text-surface-500">
    <i class="pi pi-lock text-surface-400 text-sm"></i>
    <span>No location — locked</span>
  </div>
} @else {
  <p-iconfield>
    <p-inputicon><i class="pi pi-map-marker"></i></p-inputicon>
    <p-autocomplete
      class="w-full"
      [suggestions]="suggestions()"
      optionLabel="label"
      placeholder="Search for a place..."
      appendTo="body"
      (completeMethod)="search($event)"
      (onSelect)="selectPlace($event)"
      fluid
      showClear
    >
      <ng-template #item let-item>
        <div class="flex flex-col">
          <span class="font-medium text-sm">{{ item.mainText }}</span>
          <span class="text-xs text-surface-400">{{ item.secondaryText }}</span>
        </div>
      </ng-template>
    </p-autocomplete>
  </p-iconfield>
  <span class="text-xs text-surface-400 mt-1 block">
    Start typing to search — select a suggestion to confirm.
  </span>
}
