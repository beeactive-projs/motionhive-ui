<p-iconfield>
  <p-inputicon><i class="pi pi-map-marker"></i></p-inputicon>
  <p-autocomplete class="w-full" [suggestions]="suggestions()" optionLabel="label" placeholder="Search for a place..."
    [appendTo]="'body'" (completeMethod)="search($event)" (onSelect)="selectPlace($event)" fluid showClear>
    <ng-template #item let-item>
      <div class="flex flex-col">
        <span class="font-medium text-sm">{{ item.mainText }}</span>
        <span class="text-xs text-surface-400">{{ item.secondaryText }}</span>
      </div>
    </ng-template>
  </p-autocomplete>
</p-iconfield>
<span class="text-xs text-surface-400 mt-1 block">Start typing to search — select a suggestion to confirm.</span>
