<p-iconfield>
  <p-inputicon><i class="pi pi-search"></i></p-inputicon>
  <p-autocomplete
    class="w-full"
    [suggestions]="suggestions()"
    optionLabel="email"
    [placeholder]="placeholder()"
    [appendTo]="'body'"
    [delay]="0"
    (completeMethod)="search($event)"
    (onSelect)="onSelect($event)"
    (onClear)="onClear()"
    fluid
    showClear
  >
    <ng-template #item let-user>
      <div class="flex items-center gap-3 py-1">
        @if (user.avatarUrl) {
          <img [src]="user.avatarUrl" [alt]="displayName(user)"
            class="w-8 h-8 rounded-full object-cover border border-surface-200" />
        } @else {
          <span
            class="w-8 h-8 rounded-full bg-primary-100 text-primary-700 text-xs font-semibold inline-flex items-center justify-center">
            {{ initials(user) }}
          </span>
        }
        <div class="flex flex-col min-w-0">
          <span class="font-medium text-sm truncate">{{ displayName(user) }}</span>
          <span class="text-xs text-surface-500 truncate">{{ user.email }}</span>
        </div>
      </div>
    </ng-template>
    <ng-template #empty>
      <div class="p-3 text-sm text-surface-500">No matching users. Try inviting by email instead.</div>
    </ng-template>
  </p-autocomplete>
</p-iconfield>
