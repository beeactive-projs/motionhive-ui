<p-dialog [(visible)]="visible" modal [closable]="true" [dismissableMask]="true"
  [style]="{ width: '560px', maxWidth: '94vw' }">

  <ng-template #header>
    <div class="flex flex-col gap-1">
      <h2 class="m-0 font-heading text-2xl font-bold leading-tight">
        {{ headline() }}
      </h2>
      <p class="m-0 text-sm text-muted-color">
        {{ subcopy() }}
      </p>
    </div>
  </ng-template>

  <div class="flex flex-col gap-5 pt-2">
    <!-- URL + copy -->
    <div class="flex items-center gap-2 rounded-lg bg-surface-100 dark:bg-surface-800 p-2 pl-3">
      <input pInputText type="text" [value]="displayUrl()" readonly
        class="flex-1 bg-transparent! border-0! shadow-none! font-mono text-sm" />
      <p-button [label]="copied() ? 'Copied' : 'Copy'" [icon]="copied() ? 'pi pi-check' : 'pi pi-copy'" size="small"
        severity="secondary" [outlined]="true" rounded (onClick)="copy()" />
    </div>

    <!-- Share targets -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      @for (tile of tiles; track tile.id) {
      <p-button severity="secondary" [outlined]="true" styleClass="share-tile w-full" (onClick)="shareTo(tile.id)">
        <div class="flex flex-col items-center justify-center gap-2 py-2 w-full">
          <i [class]="tile.icon + ' text-2xl'"></i>
          <span class="text-sm font-medium">{{ tile.label }}</span>
        </div>
      </p-button>
      }
    </div>

    <!-- Preview -->
    <div class="flex flex-col gap-2">
      <span class="text-xs font-semibold tracking-wider text-muted-color uppercase">
        Preview · How it looks when shared
      </span>
      <div class="rounded-xl overflow-hidden border border-surface-200 dark:border-surface-700">
        @if (previewCoverUrl(); as cover) {
        <img [src]="cover" alt="" class="block w-full aspect-[1.91/1] object-cover" />
        } @else {
        <img src="svg/logo-bg-navy.svg" alt="MotionHive" class="h-50 w-full bg-navy-500" />
        }
        <div class="flex flex-col gap-1 px-4 py-3 bg-surface-0 dark:bg-surface-900">
          @if (previewTitle()) {
          <p class="m-0 text-sm font-semibold leading-snug">{{ previewTitle() }}</p>
          }
          @if (previewSubtitle()) {
          <p class="m-0 text-xs text-muted-color">{{ previewSubtitle() }}</p>
          }
          <p class="m-0 text-xs text-muted-color font-mono">{{ displayUrl() }}</p>
        </div>
      </div>
    </div>
  </div>
</p-dialog>

<p-toast />
