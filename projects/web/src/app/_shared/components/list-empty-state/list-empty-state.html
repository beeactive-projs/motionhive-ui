<div class="flex flex-col items-center gap-3 py-12 text-center">
  <i [class]="icon() + ' text-4xl text-secondary-300'" aria-hidden="true"></i>
  <h2 class="text-secondary-700 text-lg font-semibold">{{ title() }}</h2>
  @if (message()) {
  <p class="text-secondary-500 max-w-sm text-sm">{{ message() }}</p>
  }
  @if (actionLabel()) {
  <p-button [label]="actionLabel()!" [icon]="actionIcon() ?? ''" [severity]="actionSeverity()"
    [outlined]="actionOutlined()" size="small" styleClass="mt-2" (onClick)="action.emit()" />
  }
</div>
