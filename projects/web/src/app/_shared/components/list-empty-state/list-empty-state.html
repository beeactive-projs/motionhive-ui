<div class="flex flex-col items-center gap-4 py-12 text-center">
  <mh-hex
    orientation="pointy"
    tone="amberSoft"
    [size]="64"
    [round]="8"
    [sheen]="true"
    [shadow]="true"
  >
    <i [class]="icon()" aria-hidden="true"></i>
  </mh-hex>
  <div class="flex flex-col gap-1.5">
    <h2 class="text-secondary-700 text-lg font-semibold">{{ title() }}</h2>
    @if (message()) {
    <p class="text-secondary-500 max-w-sm text-sm">{{ message() }}</p>
    }
  </div>
  @if (actionLabel()) {
  <p-button
    [label]="actionLabel()!"
    [icon]="actionIcon() ?? ''"
    [severity]="actionSeverity()"
    [outlined]="actionOutlined()"
    styleClass="mt-1"
    (onClick)="action.emit()"
  />
  }
</div>
