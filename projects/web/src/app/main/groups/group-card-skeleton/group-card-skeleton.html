<p-card class="h-full shadow-md">
  <div class="flex items-start gap-3.5">
    <p-skeleton width="3.5rem" height="3.5rem" borderRadius="0.75rem"/>
    <div class="min-w-0 flex-1 flex flex-col gap-2">
      <p-skeleton width="70%" height="0.875rem"/>
      <p-skeleton width="40%" height="0.625rem"/>
      <p-skeleton width="5.25rem" height="1.25rem" borderRadius="999px"/>
    </div>
  </div>
  <p-skeleton width="95%" height="0.625rem" class="mt-3.5!"/>
  <p-skeleton width="80%" height="0.625rem" class="mt-1.5!"/>

  <ng-template #footer>
    <div class="flex items-center justify-between">
      <p-skeleton width="6.25rem" height="1.375rem" borderRadius="999px"/>
      <p-skeleton width="4.375rem" height="0.75rem"/>
    </div>
  </ng-template>
</p-card>
