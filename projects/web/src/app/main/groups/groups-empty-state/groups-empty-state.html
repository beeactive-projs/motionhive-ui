<p-card class="gp-empty shadow-md">
  <div class="text-center">
    <mh-hex
      class="mx-auto mb-4 block w-fit"
      orientation="pointy"
      tone="amber"
      icon="users"
      [size]="80"
      [round]="9"
      [sheen]="true"
      [shadow]="true"
    />

    @if (variant() === 'manage') {
      <h3 class="text-lg font-bold">
        No groups yet<span class="text-primary">.</span>
      </h3>
      <p class="max-w-sm mx-auto mb-4 text-sm text-surface-600">
        Organize your clients into groups for sessions and communication —
        start with your most active 3 to 5 clients.
      </p>
      <div class="flex gap-2.5 justify-center">
        <p-button label="Create your first group"
                  icon="pi pi-plus"
                  (onClick)="createGroup.emit()"/>
      </div>
    } @else {
      <h3 class="text-lg font-bold">
        No groups match your search<span class="text-primary">.</span>
      </h3>
      <p class="max-w-sm mx-auto text-sm text-surface-600">
        Try a different search, or check back later.
      </p>
    }
  </div>
</p-card>
