<p-toast />

@if (context.loading()) {
<p-skeleton width="100%" height="160px" />
} @else if (context.group(); as g) {
<main class="flex flex-col gap-4 max-w-400 mx-auto">
  <mh-group-hero [group]="g" [membersCount]="membersCount()" />
  <mh-group-tabs [membersCount]="membersCount()" />
  <div>
    <router-outlet />
  </div>
</main>
} @else {
<div>
  <p-message severity="warn" icon="pi pi-exclamation-triangle">
    <div class="flex flex-col gap-2">
      <h2 class="m-0 text-base font-semibold">Group not found</h2>
      <p class="m-0 text-sm">The group you are looking for does not exist or has been deleted.</p>
    </div>
  </p-message>
  <p-button label="Back to groups" icon="pi pi-arrow-left" (onClick)="goBack()" />
</div>
}

@if (context.group(); as g) {
<mh-add-members-dialog [(visible)]="context.showAddMembersDialog" [groupId]="g.id" (saved)="onMembersAdded()" />

<mh-group-form-dialog [(visible)]="showEditDialog" [group]="editingGroup()" (saved)="onGroupSaved()" />
}

<p-confirmDialog />
