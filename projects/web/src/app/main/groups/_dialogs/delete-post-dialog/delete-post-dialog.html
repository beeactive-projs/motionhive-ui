<p-dialog
  [(visible)]="visible"
  header="Delete post"
  [modal]="true"
  [closable]="!submitting()"
  [closeOnEscape]="!submitting()"
  [dismissableMask]="false"
  [style]="{ width: '420px', maxWidth: '95vw' }">

  <p class="text-sm text-surface-700 dark:text-surface-300">
    Delete this post permanently? Comments, reactions, and uploaded images will be removed too.
  </p>

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" severity="secondary" text [disabled]="submitting()" (onClick)="cancel()" />
      <p-button
        label="Delete"
        severity="danger"
        [loading]="submitting()"
        (onClick)="submit()" />
    </div>
  </ng-template>
</p-dialog>
