@if (flags(); as f) {
  <div class="mh-threat" role="status" aria-live="polite">
    <i class="pi pi-exclamation-triangle mh-threat__icon" aria-hidden="true"></i>
    <div class="mh-threat__body">
      <div class="mh-threat__title">Your last message contains {{ reasons().join(', ') }}.</div>
      <div class="mh-threat__copy">
        Keep payments and identity verification on MotionHive — we can't help recover
        funds or accounts after off-platform exchanges.
      </div>
    </div>
    <button
      type="button"
      class="mh-threat__dismiss"
      (click)="dismiss()"
      aria-label="Dismiss safety notice"
    >
      <i class="pi pi-times" aria-hidden="true"></i>
    </button>
  </div>
}
