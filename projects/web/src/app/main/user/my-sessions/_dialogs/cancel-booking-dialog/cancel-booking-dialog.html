<p-dialog header="Cancel booking" [(visible)]="visible" [modal]="true" [style]="{ width: '35rem'}" [closable]="true">
  @let p = participant();
  @if (p) {
  <div class="flex flex-col gap-3">
    <p-message severity="warn" styleClass="w-full">
      Cancel up to <strong>{{ p.snapshotCancelCutoffH }}h</strong> before the
      session to avoid charges.
    </p-message>

    <div class="flex flex-col gap-1">
      <label for="cbReason" class="text-sm font-medium text-surface-900 dark:text-surface-100">
        Reason (optional)
      </label>
      <input id="cbReason" pInputText fluid [ngModel]="reason()" (ngModelChange)="reason.set($event)"
        placeholder="Conflict, illness, etc." />
    </div>

    <div class="flex flex-col gap-1">
      <label for="cbMessage" class="text-sm font-medium text-surface-900 dark:text-surface-100">
        Message to coach (optional)
      </label>
      <textarea id="cbMessage" pTextarea rows="3" fluid [ngModel]="message()" (ngModelChange)="message.set($event)"
        placeholder="Anything you want them to know."></textarea>
    </div>
  </div>
  }

  <ng-template #footer>
    <p-button label="Keep booking" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button label="Cancel booking" icon="pi pi-times" severity="danger" [loading]="busy()" (onClick)="submit()" />
  </ng-template>
</p-dialog>
