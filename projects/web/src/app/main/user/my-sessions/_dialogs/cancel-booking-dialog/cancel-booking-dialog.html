<p-dialog header="Cancel booking" [(visible)]="visible" [modal]="true" [style]="{ width: '28rem', maxWidth: '95vw' }"
  [closable]="true">
  @let p = participant();
  <div class="mh-cb">
    @if (p) {
    <p class="mh-cb__intro">
      Cancel up to <strong>{{ p.snapshotCancelCutoffH }}h</strong> before the session to avoid charges.
    </p>
    <div class="mh-cb__field">
      <label for="cbReason">Reason (optional)</label>
      <input id="cbReason" pInputText fluid [ngModel]="reason()" (ngModelChange)="reason.set($event)"
        placeholder="Conflict, illness, etc." />
    </div>
    <div class="mh-cb__field">
      <label for="cbMessage">Message to coach (optional)</label>
      <textarea id="cbMessage" pTextarea rows="3" fluid [ngModel]="message()" (ngModelChange)="message.set($event)"
        placeholder="Anything you want them to know."></textarea>
    </div>
    }
  </div>

  <ng-template #footer>
    <p-button label="Keep booking" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button label="Cancel booking" icon="pi pi-times" severity="danger" [loading]="busy()" (onClick)="submit()" />
  </ng-template>
</p-dialog>
