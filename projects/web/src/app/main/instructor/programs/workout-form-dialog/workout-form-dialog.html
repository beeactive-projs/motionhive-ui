<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="!submitting()"
  [closeOnEscape]="!submitting()"
  [dismissableMask]="!submitting()"
  [appendTo]="'body'"
  [style]="{ width: '520px' }"
  [breakpoints]="{ '640px': '95vw' }"
  styleClass="mh-workout-form-dialog"
  [header]="dialogHeader()">
  <div class="dialog-body">
    <div class="field">
      <label for="wname">Workout name *</label>
      <input
        pInputText
        id="wname"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        maxlength="200"
        placeholder="e.g. Day 1 — Upper"
        class="w-full"
        autocomplete="off"
      />
    </div>

    <div class="row">
      <div class="field grow">
        <label for="week">Week</label>
        <p-select
          inputId="week"
          [options]="weekOptions()"
          [(ngModel)]="weekIndex"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
          styleClass="w-full"
        />
      </div>
      <div class="field grow">
        <label for="day">Day</label>
        <p-select
          inputId="day"
          [options]="dayOptions"
          [(ngModel)]="dayIndex"
          optionLabel="label"
          optionValue="value"
          appendTo="body"
          styleClass="w-full"
        />
      </div>
    </div>

    <div class="row">
      <div class="field grow">
        <label for="phase">
          Phase <span class="optional">(optional)</span>
        </label>
        <input
          pInputText
          id="phase"
          [ngModel]="phase()"
          (ngModelChange)="phase.set($event)"
          maxlength="50"
          placeholder="e.g. accumulation"
          class="w-full"
          autocomplete="off"
        />
      </div>
      <div class="field grow">
        <label for="duration">
          Duration <span class="optional">(min)</span>
        </label>
        <p-inputnumber
          inputId="duration"
          [ngModel]="estimatedDurationMinutes()"
          (ngModelChange)="estimatedDurationMinutes.set($event)"
          [min]="5"
          [max]="480"
          [allowEmpty]="true"
          placeholder="—"
          styleClass="w-full"
        />
      </div>
    </div>

    <div class="field">
      <label for="wnotes">Notes <span class="optional">(optional)</span></label>
      <textarea
        pTextarea
        id="wnotes"
        [ngModel]="notes()"
        (ngModelChange)="notes.set($event)"
        rows="3"
        maxlength="2000"
        placeholder="Coaching cues, warm-up notes, intent of the session…"
        class="w-full"
      ></textarea>
    </div>
  </div>

  <ng-template #footer>
    <p-button
      label="Cancel"
      severity="secondary"
      [text]="true"
      [disabled]="submitting()"
      (onClick)="cancel()"
    />
    <p-button
      [label]="submitLabel()"
      icon="pi pi-check"
      [loading]="submitting()"
      [disabled]="!canSubmit()"
      (onClick)="submit()"
    />
  </ng-template>
</p-dialog>

<p-toast position="top-right" />
