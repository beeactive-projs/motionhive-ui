@let v = venue();
@let m = meta();
@let details = detailsLine();

<div
  class="group flex items-center gap-3 rounded-md bg-surface-50 dark:bg-surface-900 px-3 py-2"
  [class.opacity-60]="!v.isActive"
>
  <div
    class="grid h-8 w-8 place-items-center rounded-md bg-primary-50 dark:bg-primary-900/30 text-primary-600 dark:text-primary-300 shrink-0"
  >
    <i [class]="m.icon + ' text-sm'"></i>
  </div>

  <div class="flex-1 min-w-0">
    <div class="flex items-center gap-2 min-w-0">
      <span class="text-sm font-semibold truncate" [pTooltip]="v.name" tooltipPosition="top">{{ v.name }}</span>
      <p-tag [value]="m.label" severity="secondary" class="text-[10px]! shrink-0 hidden sm:inline-flex" />
      @if (!v.isActive) {
        <p-tag value="Archived" severity="contrast" class="text-[10px]! shrink-0" />
      }
    </div>

    @if (details) {
      <p
        class="text-xs text-surface-500 mt-0.5 m-0 truncate"
        [pTooltip]="tooltipContent()"
        tooltipPosition="bottom"
        tooltipStyleClass="venue-tooltip"
      >
        {{ details }}
      </p>
    }
  </div>

  @if (showActions()) {
    <div class="flex items-center gap-0.5 shrink-0">
      <p-button
        icon="pi pi-pencil"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        size="small"
        pTooltip="Edit"
        tooltipPosition="top"
        (onClick)="onEdit()"
      />
      @if (v.isActive) {
        <p-button
          icon="pi pi-inbox"
          severity="secondary"
          [text]="true"
          [rounded]="true"
          size="small"
          pTooltip="Archive"
          tooltipPosition="top"
          (onClick)="onArchive()"
        />
      } @else {
        <p-button
          icon="pi pi-refresh"
          severity="success"
          [text]="true"
          [rounded]="true"
          size="small"
          pTooltip="Restore"
          tooltipPosition="top"
          (onClick)="onRestore()"
        />
      }
      <p-button
        icon="pi pi-trash"
        severity="danger"
        [text]="true"
        [rounded]="true"
        size="small"
        pTooltip="Delete"
        tooltipPosition="top"
        (onClick)="onRemove()"
      />
    </div>
  }
</div>
