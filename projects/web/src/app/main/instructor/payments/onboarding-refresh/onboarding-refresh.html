<div class="flex items-center justify-center min-h-[60vh]">
  <p-card class="w-full max-w-md">
    @if (redirecting()) {
      <div class="flex flex-col items-center text-center gap-4 py-8">
        <p-progressSpinner strokeWidth="4" [style]="{ width: '50px', height: '50px' }" />
        <div>
          <h3 class="text-lg font-semibold text-surface-900 dark:text-surface-50 m-0">
            Redirecting to Stripe...
          </h3>
          <p class="text-surface-500 text-sm mt-2 mb-0">
            Generating a fresh onboarding link.
          </p>
        </div>
      </div>
    } @else if (error()) {
      <div class="flex flex-col items-center text-center gap-4 py-8">
        <i class="pi pi-times-circle text-5xl" style="color: var(--p-red-500)"></i>
        <div>
          <h3 class="text-lg font-semibold text-surface-900 dark:text-surface-50 m-0">
            Something went wrong
          </h3>
          <p class="text-surface-500 text-sm mt-2 mb-0">
            We couldn't generate a new onboarding link. Please try again.
          </p>
        </div>
        <p-button label="Try again" icon="pi pi-refresh" (onClick)="retry()" />
      </div>
    }
  </p-card>
</div>
