<p-dialog header="Issue refund" [(visible)]="visible" [modal]="true" [style]="{ width: '26rem' }">
  @if (payment(); as p) {
    <div class="flex flex-col gap-4">
      <!-- Payment context -->
      <div class="bg-surface-100 dark:bg-surface-800 rounded-lg p-3">
        <div class="text-sm text-surface-500 mb-1">Original payment</div>
        <div class="font-semibold text-lg">{{ p.amountCents | currencyRon:p.currency }}</div>
        @if (p.refundedAmountCents > 0) {
          <div class="text-sm text-surface-500 mt-1">
            Already refunded: {{ p.refundedAmountCents | currencyRon:p.currency }}
          </div>
        }
      </div>

      <!-- Amount -->
      <div class="flex flex-col gap-1">
        <label for="refundAmount" class="text-sm font-medium">Refund amount</label>
        <p-inputNumber id="refundAmount" [(ngModel)]="formAmount" mode="currency"
          currency="RON" locale="ro-RO" [minFractionDigits]="2" [min]="0.01"
          [max]="maxRefundable" class="w-full" />
      </div>

      <!-- Reason -->
      <div class="flex flex-col gap-1">
        <label for="refundReason" class="text-sm font-medium">Reason</label>
        <p-select id="refundReason" [(ngModel)]="formReason" [options]="reasonOptions"
          optionLabel="label" optionValue="value" placeholder="Select a reason" class="w-full" />
      </div>

      <!-- Notes -->
      <div class="flex flex-col gap-1">
        <label for="refundNotes" class="text-sm font-medium">Notes (optional)</label>
        <textarea id="refundNotes" pTextarea [(ngModel)]="formNotes" rows="2"
          placeholder="Internal notes about this refund"></textarea>
      </div>
    </div>
  }

  <ng-template #footer>
    <div class="flex justify-end gap-2">
      <p-button label="Cancel" [text]="true" severity="secondary" (onClick)="visible.set(false)" />
      <p-button label="Issue refund" icon="pi pi-check" severity="danger"
        [loading]="saving()" (onClick)="submit()" />
    </div>
  </ng-template>
</p-dialog>
