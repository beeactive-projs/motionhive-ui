<p-dialog header="Edit client notes" [(visible)]="visible" [modal]="true" [style]="{ width: '28rem' }"
  [closable]="true">
  <div class="flex flex-col gap-4">
    @if (client(); as c) {
    <mh-user-info [user]="c.client" />
    }
    <div class="flex flex-col gap-2">
      <label for="editNotes" class="text-sm font-medium text-secondary-700">Notes</label>
      <textarea pTextarea id="editNotes" fluid [(ngModel)]="editNotes" [rows]="5"
        placeholder="Add private notes about this client..."></textarea>
    </div>
  </div>
  <ng-template #footer>
    <p-button label="Cancel" severity="secondary" text (onClick)="visible.set(false)" />
    <p-button label="Save notes" icon="pi pi-check" [loading]="notesLoading()"
      (onClick)="saveNotes()" />
  </ng-template>
</p-dialog>
