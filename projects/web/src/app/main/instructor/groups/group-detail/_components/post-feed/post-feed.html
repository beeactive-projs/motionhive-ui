<div class="flex flex-col gap-3">
  <div class="flex items-center justify-between">
    <h2 class="text-lg font-semibold text-surface-900 dark:text-surface-100">
      Posts ({{ total() }})
    </h2>
    @if (canPost()) {
    <p-button label="New post" icon="pi pi-plus" size="small"
      (onClick)="createRequested.emit()" />
    }
  </div>

  @if (loading()) {
  <div class="flex flex-col gap-3">
    @for (i of [1, 2, 3]; track i) {
    <p-card>
      <div class="flex flex-col gap-3">
        <div class="flex items-center gap-3">
          <p-skeleton shape="circle" size="2.5rem" />
          <div class="flex-1 flex flex-col gap-1">
            <p-skeleton width="8rem" height="0.875rem" />
            <p-skeleton width="6rem" height="0.75rem" />
          </div>
        </div>
        <p-skeleton width="100%" height="3rem" />
        <p-skeleton width="60%" height="0.875rem" />
      </div>
    </p-card>
    }
  </div>
  } @else if (posts().length === 0) {
  <p-card>
    <div class="flex flex-col items-center gap-3 py-8 text-center">
      <i class="pi pi-comments text-3xl text-surface-300"></i>
      <p class="text-sm text-surface-500">No posts yet.</p>
      @if (canPost()) {
      <p-button label="Create the first post" icon="pi pi-plus" size="small"
        (onClick)="createRequested.emit()" />
      }
    </div>
  </p-card>
  } @else {
  <div class="flex flex-col gap-3">
    @for (post of posts(); track trackById($index, post)) {
    <mh-post-card
      [post]="post"
      [canModerate]="canModerate()"
      (editRequested)="editRequested.emit($event)"
      (deleteRequested)="deleteRequested.emit($event)" />
    }
  </div>
  }
</div>
