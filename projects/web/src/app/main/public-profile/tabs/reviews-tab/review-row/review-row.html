<p-card>
  <div class="flex items-start gap-3">
    <mh-avatar [user]="avatarUser()" size="normal" />
    <div class="flex-1 min-w-0">
      <div class="flex items-center justify-between gap-2">
        <span class="font-medium text-sm">{{ review().author.name }}</span>
        <span class="text-xs text-muted-color">{{ review().createdAt | date: 'mediumDate' }}</span>
      </div>
      <div
        class="flex items-center gap-0.5 mt-0.5"
        [attr.aria-label]="review().rating + ' out of 5 stars'">
        @for (i of stars(); track i) {
          <i
            class="pi text-xs text-yellow-500"
            [class.pi-star-fill]="i <= review().rating"
            [class.pi-star]="i > review().rating"
            aria-hidden="true"></i>
        }
        @if (review().monthsIn != null) {
          <span class="text-xs text-muted-color ml-2">
            · After {{ review().monthsIn }} {{ review().monthsIn === 1 ? 'month' : 'months' }}
          </span>
        }
      </div>
      <p class="m-0 mt-2 text-sm leading-relaxed whitespace-pre-wrap">{{ review().body }}</p>
    </div>
  </div>
</p-card>
