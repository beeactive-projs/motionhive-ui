@if (loading() && reviews().length === 0) {
  <div class="flex flex-col gap-3">
    <p-skeleton height="120px" />
    <p-skeleton height="120px" />
    <p-skeleton height="120px" />
  </div>
} @else if (reviews().length === 0) {
  <p-card>
    <div class="text-center py-6 text-muted-color">
      <i class="pi pi-comments text-2xl mb-2 block"></i>
      <p class="m-0 text-sm">No reviews yet — be the first once you've trained together.</p>
    </div>
  </p-card>
} @else {
  <div class="flex flex-col gap-4">
    @if (breakdown(); as b) {
      <p-card>
        <mh-rating-breakdown [breakdown]="b" />
      </p-card>
    }

    <div class="flex flex-col gap-3">
      @for (review of reviews(); track review.id) {
        <mh-review-row [review]="review" />
      }
    </div>

    @if (hasMore()) {
      <div class="flex justify-center pt-2">
        <p-button
          label="Load more"
          severity="secondary"
          outlined
          [loading]="loading()"
          (onClick)="onLoadMore()" />
      </div>
    }
  </div>
}
