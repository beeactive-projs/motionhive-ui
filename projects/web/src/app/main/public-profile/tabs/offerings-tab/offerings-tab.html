<p-card class="shadow-md">
  <ng-template #header>
    <div class="flex items-start gap-3 px-4 pt-4">
      <p-avatar icon="pi pi-bolt" shape="square" size="normal"
        [style]="{ background: 'var(--p-primary-100)', color: 'var(--p-primary-600)' }" />
      <div class="flex flex-col self-center">
        <h2 class="m-0 text-lg font-bold leading-tight">Work with me</h2>
        <p class="m-0 mt-0.5 text-sm text-muted-color">Pick a way to train together</p>
      </div>
    </div>
  </ng-template>

  @if (loading() && !offerings()) {
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <p-skeleton height="180px" />
    <p-skeleton height="180px" />
    <p-skeleton height="180px" />
  </div>
  } @else if (!offerings() || offerings()!.length === 0) {
  <div class="text-center py-6 text-muted-color">
    <i class="pi pi-shopping-bag text-2xl mb-2 block"></i>
    <p class="m-0 text-sm">No offerings yet.</p>
  </div>
  } @else {
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    @for (product of offerings(); track product.id) {
    <mh-offering-card [product]="product" />
    }
  </div>
  }
</p-card>
