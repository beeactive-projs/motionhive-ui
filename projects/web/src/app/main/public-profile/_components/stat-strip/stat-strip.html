@if (cells().length > 0) {
  <p-card styleClass="stat-strip-card">
    <div class="grid grid-cols-2 md:grid-cols-3 divide-x divide-[var(--p-content-border-color)]">
      @for (cell of cells(); track cell.label) {
        <div class="flex flex-col items-center justify-center py-3 px-4">
          <span class="text-2xl md:text-3xl font-semibold leading-tight">{{ cell.value }}</span>
          <span class="text-xs uppercase tracking-wide text-muted-color">{{ cell.label }}</span>
        </div>
      }
    </div>
  </p-card>
}
