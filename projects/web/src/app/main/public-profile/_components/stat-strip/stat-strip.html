@if (stats().length > 0) {
  <p-card styleClass="stat-strip-card">
    <div class="grid grid-cols-2 sm:grid-cols-4 divide-x divide-[var(--p-content-border-color)]">
      @for (cell of stats(); track cell.label) {
        <div class="flex flex-col items-start justify-center py-4 px-5">
          <span class="text-2xl md:text-3xl font-semibold leading-tight">{{ cell.value }}</span>
          <span class="text-xs uppercase tracking-wide text-muted-color mt-1">{{ cell.label }}</span>
        </div>
      }
    </div>
  </p-card>
}
