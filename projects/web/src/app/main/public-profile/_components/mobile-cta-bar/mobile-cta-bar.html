<div
  class="cta-bar lg:hidden fixed bottom-0 inset-x-0 z-40 flex gap-2 px-4 py-3"
  role="region"
  aria-label="Quick actions">
  <p-button
    fluid
    label="Book a session"
    icon="pi pi-calendar"
    (onClick)="book.emit()"
    [disabled]="!offerings()?.length" />
  <p-button
    icon="pi pi-envelope"
    severity="secondary"
    outlined
    ariaLabel="Message coach"
    (onClick)="message.emit()" />
</div>
