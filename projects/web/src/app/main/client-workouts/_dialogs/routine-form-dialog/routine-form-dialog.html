<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="!submitting()"
  [closeOnEscape]="!submitting()"
  [dismissableMask]="!submitting()"
  [appendTo]="'body'"
  [style]="{ width: '640px' }"
  [breakpoints]="{ '720px': '95vw' }"
  styleClass="mh-routine-form-dialog"
  [header]="dialogHeader()">
  <div class="dialog-body">
    <div class="field">
      <label for="rname">Routine name *</label>
      <input
        pInputText
        id="rname"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        maxlength="200"
        placeholder="e.g. Push day A"
        autocomplete="off"
        class="w-full"
      />
    </div>

    <div class="row">
      <div class="field grow">
        <label for="rfolder">
          Folder <span class="optional">(optional)</span>
        </label>
        <input
          pInputText
          id="rfolder"
          [ngModel]="folder()"
          (ngModelChange)="folder.set($event)"
          maxlength="100"
          placeholder="e.g. PPL split"
          autocomplete="off"
          class="w-full"
        />
      </div>
    </div>

    <div class="field">
      <label for="rnotes">
        Notes <span class="optional">(optional)</span>
      </label>
      <textarea
        pTextarea
        id="rnotes"
        rows="2"
        maxlength="2000"
        [ngModel]="notes()"
        (ngModelChange)="notes.set($event)"
        placeholder="Anything to remember about this routine…"
        class="w-full"
      ></textarea>
    </div>

    <div class="ex-section">
      <div class="ex-section__head">
        <h4>Exercises</h4>
        <p-button
          label="Add exercise"
          icon="pi pi-plus"
          severity="secondary"
          [text]="true"
          size="small"
          (onClick)="openPicker()"
        />
      </div>

      @if (exercises().length === 0) {
        <div class="ex-empty">
          No exercises yet — tap "Add exercise" to start building.
        </div>
      } @else {
        <ul class="ex-list">
          @for (e of exercises(); track e.uiKey; let i = $index) {
            <li class="ex-item">
              <div class="ex-item__head">
                @if (e.exerciseThumbnailUrl) {
                  <img
                    class="thumb"
                    [src]="e.exerciseThumbnailUrl"
                    [alt]="e.exerciseName"
                    loading="lazy"
                  />
                } @else {
                  <div class="thumb thumb--fallback">
                    <i class="pi pi-bolt"></i>
                  </div>
                }
                <div class="meta">
                  <div class="num">{{ i + 1 }}.</div>
                  <div class="name">{{ e.exerciseName }}</div>
                </div>
                <div class="ex-actions">
                  <button
                    type="button"
                    class="iconbtn"
                    pTooltip="Move up"
                    [disabled]="i === 0"
                    (click)="moveUp(e.uiKey)"
                  >
                    <i class="pi pi-arrow-up"></i>
                  </button>
                  <button
                    type="button"
                    class="iconbtn"
                    pTooltip="Move down"
                    [disabled]="i === exercises().length - 1"
                    (click)="moveDown(e.uiKey)"
                  >
                    <i class="pi pi-arrow-down"></i>
                  </button>
                  <button
                    type="button"
                    class="iconbtn iconbtn--danger"
                    pTooltip="Remove"
                    (click)="removeExercise(e.uiKey)"
                  >
                    <i class="pi pi-trash"></i>
                  </button>
                </div>
              </div>
              <div class="ex-fields">
                <div class="ex-field">
                  <label>Sets</label>
                  <p-inputnumber
                    [ngModel]="e.defaultSets"
                    (ngModelChange)="patchExercise(e.uiKey, { defaultSets: $event ?? 3 })"
                    [min]="1"
                    [max]="30"
                    [showButtons]="false"
                    styleClass="num-input"
                  />
                </div>
                <div class="ex-field">
                  <label>Reps min</label>
                  <p-inputnumber
                    [ngModel]="e.targetRepsMin"
                    (ngModelChange)="patchExercise(e.uiKey, { targetRepsMin: $event })"
                    [min]="0"
                    [max]="1000"
                    [allowEmpty]="true"
                    placeholder="—"
                    styleClass="num-input"
                  />
                </div>
                <div class="ex-field">
                  <label>Reps max</label>
                  <p-inputnumber
                    [ngModel]="e.targetRepsMax"
                    (ngModelChange)="patchExercise(e.uiKey, { targetRepsMax: $event })"
                    [min]="0"
                    [max]="1000"
                    [allowEmpty]="true"
                    placeholder="—"
                    styleClass="num-input"
                  />
                </div>
                <div class="ex-field">
                  <label>Weight (kg)</label>
                  <p-inputnumber
                    [ngModel]="e.targetWeightKg"
                    (ngModelChange)="patchExercise(e.uiKey, { targetWeightKg: $event })"
                    [min]="0"
                    [max]="9999"
                    [maxFractionDigits]="2"
                    [allowEmpty]="true"
                    placeholder="—"
                    styleClass="num-input"
                  />
                </div>
                <div class="ex-field">
                  <label>Rest (s)</label>
                  <p-inputnumber
                    [ngModel]="e.restAfterSeconds"
                    (ngModelChange)="patchExercise(e.uiKey, { restAfterSeconds: $event })"
                    [min]="0"
                    [max]="600"
                    [allowEmpty]="true"
                    placeholder="—"
                    styleClass="num-input"
                  />
                </div>
              </div>
            </li>
          }
        </ul>
      }
    </div>
  </div>

  <ng-template #footer>
    <p-button
      label="Cancel"
      severity="secondary"
      [text]="true"
      [disabled]="submitting()"
      (onClick)="cancel()"
    />
    <p-button
      [label]="submitLabel()"
      icon="pi pi-check"
      [loading]="submitting()"
      [disabled]="!canSubmit()"
      (onClick)="submit()"
    />
  </ng-template>
</p-dialog>

<mh-exercise-picker-dialog
  [program]="$any({ id: 'inline' })"
  [workout]="$any({ id: 'inline', name: 'Routine' })"
  [emitOnly]="true"
  [(visible)]="pickerOpen"
  (picked)="onExercisePicked($event)"
/>

<p-toast position="top-right" />
