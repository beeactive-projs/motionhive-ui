<div class="flex flex-col gap-4">
  <!-- Compact segmented toggle — one section on screen at a time. -->
  <div class="inline-flex p-1 rounded-lg bg-surface-100 dark:bg-surface-800 w-fit" role="tablist"
    aria-label="Billing view">
    <button type="button" role="tab" [attr.aria-selected]="view() === 'invoices'"
      (click)="view.set('invoices')" class="flex items-center gap-2 rounded-md px-4 py-1.5 text-sm font-medium transition-colors"
      [class]="view() === 'invoices'
        ? 'bg-surface-0 dark:bg-surface-950 text-primary-700 dark:text-primary-400 shadow-sm'
        : 'text-surface-500 hover:text-surface-700'">
      <i class="pi pi-receipt text-xs"></i>
      Invoices
    </button>
    <button type="button" role="tab" [attr.aria-selected]="view() === 'memberships'"
      (click)="view.set('memberships')" class="flex items-center gap-2 rounded-md px-4 py-1.5 text-sm font-medium transition-colors"
      [class]="view() === 'memberships'
        ? 'bg-surface-0 dark:bg-surface-950 text-primary-700 dark:text-primary-400 shadow-sm'
        : 'text-surface-500 hover:text-surface-700'">
      <i class="pi pi-refresh text-xs"></i>
      Memberships
    </button>
  </div>

  @if (view() === 'invoices') {
  <mh-my-invoices />
  } @else {
  <mh-my-subscriptions />
  }
</div>
