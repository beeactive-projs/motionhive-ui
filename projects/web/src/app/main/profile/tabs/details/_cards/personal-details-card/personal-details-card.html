<p-card>
  <ng-template #header>
    <div class="flex items-center justify-between px-4 pt-4">
      <div class="flex items-center gap-2">
        <i class="pi pi-id-card text-primary-600"></i>
        <h2 class="text-base font-semibold m-0">Personal details</h2>
      </div>
      <p-button
        icon="pi pi-pencil"
        [text]="true"
        [rounded]="true"
        size="small"
        severity="secondary"
        pTooltip="Edit personal details"
        tooltipPosition="left"
        ariaLabel="Edit personal details"
        (onClick)="edit.emit()"
      />
    </div>
    <p-divider />
  </ng-template>

  <div class="flex flex-col gap-1">
    <mh-profile-fact-row
      icon="pi pi-user"
      label="First name"
      [value]="profile().account.firstName"
      [privacyField]="'firstName'"
      [privacyLevel]="privacyLevel('firstName')"
      (privacyChange)="emit('firstName', $event)"
    />
    <mh-profile-fact-row
      icon="pi pi-user"
      label="Last name"
      [value]="profile().account.lastName"
      [privacyField]="'lastName'"
      [privacyLevel]="privacyLevel('lastName')"
      (privacyChange)="emit('lastName', $event)"
    />
    <mh-profile-fact-row
      icon="pi pi-envelope"
      label="Email"
      [value]="profile().account.email"
      [privacyField]="'email'"
      [privacyLevel]="privacyLevel('email')"
      (privacyChange)="emit('email', $event)"
    />
    <mh-profile-fact-row
      icon="pi pi-phone"
      label="Phone"
      [value]="profile().account.phone"
      placeholder="Not provided"
      [privacyField]="'phone'"
      [privacyLevel]="privacyLevel('phone')"
      (privacyChange)="emit('phone', $event)"
    />
  </div>
</p-card>
