<div class="flex flex-col gap-4">
  <mh-intro-card
    [profile]="profile()"
    (privacyChange)="privacyChange.emit($event)"
  />

  <mh-personal-details-card
    [profile]="profile()"
    (edit)="editPersonalInfo.emit()"
    (privacyChange)="privacyChange.emit($event)"
  />

  @if (isInstructor() && hasInstructorProfile()) {
    <mh-coaching-card
      [profile]="profile()"
      (refresh)="refresh.emit()"
    />
  } @else if (!hasInstructorProfile()) {
    <mh-become-instructor-card />
  }

  <mh-exercise-catalog-card
    [profile]="profile()"
    (refresh)="refresh.emit()"
  />
</div>
