@if (visible()) {
  <p-card class="exercise-catalog-card">
    <ng-template #title>
      <div class="header">
        <i class="pi pi-bolt header__icon"></i>
        <h3 class="header__title">Exercise catalog</h3>
      </div>
    </ng-template>

    <div class="row">
      <div class="row__copy">
        <div class="row__label">Browse the exercise catalog</div>
        <p class="row__hint">
          Off by default. Turn this on to explore the 870+ exercises in
          MotionHive — or wait for your instructor to assign you a
          program, which enables it automatically.
        </p>
      </div>

      <p-toggleswitch
        [ngModel]="optIn()"
        (ngModelChange)="toggle($event)"
        [disabled]="saving()"
        aria-label="Toggle exercise catalog access"
      />
    </div>
  </p-card>
}
