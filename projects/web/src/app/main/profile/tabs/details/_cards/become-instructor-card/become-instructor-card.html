<p-card class="shadow-md">
  <ng-template #header>
    <div class="flex items-center gap-2 px-4 pt-4">
      <i class="pi pi-graduation-cap text-primary-600"></i>
      <h2 class="text-base font-semibold m-0">Coaching profile</h2>
    </div>
    <p-divider />
  </ng-template>

  <div class="flex flex-col items-center gap-4 py-4 text-center">
    <p-avatar icon="pi pi-graduation-cap" size="large" shape="circle"
      [style]="{ 'background-color': 'var(--p-primary-100)', color: 'var(--p-primary-600)' }" />
    <div>
      <h3 class="text-lg font-semibold m-0">Become a coach</h3>
      <p class="text-surface-500 text-sm mt-1 mb-0">
        Share your expertise and start training clients on MotionHive.
      </p>
    </div>
    <p-button label="Become a coach" icon="pi pi-graduation-cap" (onClick)="visible.set(true)" />
  </div>
</p-card>

<mh-become-instructor [(visible)]="visible" />
