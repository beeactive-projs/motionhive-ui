<p-dialog header="Edit personal information" [(visible)]="visible" [modal]="true" [style]="{ width: '40rem' }"
  [closable]="true">
  <div class="flex flex-col gap-4 pt-2">

    <!-- Basic info -->
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="flex flex-col gap-2">
        <label for="piFirstName" class="text-sm font-medium">First name</label>
        <input id="piFirstName" type="text" pInputText [ngModel]="form().firstName"
          (ngModelChange)="updateField('firstName', $event)" placeholder="First name" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="piLastName" class="text-sm font-medium">Last name</label>
        <input id="piLastName" type="text" pInputText [ngModel]="form().lastName"
          (ngModelChange)="updateField('lastName', $event)" placeholder="Last name" />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="piPhone" class="text-sm font-medium">Phone number</label>
      <input id="piPhone" type="tel" pInputText [ngModel]="form().phone" (ngModelChange)="updateField('phone', $event)"
        placeholder="e.g. +1 234 567 8900" />
    </div>

    <p-divider />

    <!-- Profile info -->
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="flex flex-col gap-2">
        <label for="piDob" class="text-sm font-medium">Date of birth</label>
        <p-datepicker inputId="piDob" [ngModel]="form().dateOfBirth"
          (ngModelChange)="updateField('dateOfBirth', $event)" [showIcon]="true" [maxDate]="today" dateFormat="dd/mm/yy"
          placeholder="Select date" class="w-full" appendTo="body" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="piGender" class="text-sm font-medium">Gender</label>
        <p-select inputId="piGender" [options]="genderOptions" [ngModel]="form().gender"
          (ngModelChange)="updateField('gender', $event)" optionLabel="label" optionValue="value"
          placeholder="Select gender" [showClear]="true" fluid />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="piTimezone" class="text-sm font-medium">Timezone</label>
      <p-select inputId="piTimezone" [options]="timezoneOptions" [ngModel]="form().timezone"
        (ngModelChange)="updateField('timezone', $event)" optionLabel="label" optionValue="value"
        placeholder="Select timezone" [filter]="true" filterPlaceholder="Search timezone..."
        [showClear]="true" fluid [appendTo]="'body'" />
    </div>

    <div class="flex flex-col gap-2">
      <label for="piMedical" class="text-sm font-medium">Medical conditions</label>
      <input id="piMedical" type="text" pInputText [ngModel]="form().medicalConditions"
        (ngModelChange)="updateField('medicalConditions', $event)" placeholder="e.g. asthma, knee injury" />
      <span class="text-xs text-surface-400">Separate multiple conditions with commas.</span>
    </div>

    <div class="flex flex-col gap-2">
      <label for="piNotes" class="text-sm font-medium">Notes</label>
      <textarea id="piNotes" pTextarea [ngModel]="form().notes" (ngModelChange)="updateField('notes', $event)"
        [rows]="3" placeholder="Any additional notes..."></textarea>
    </div>

  </div>

  <ng-template #footer>
    <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="visible.set(false)" />
    <p-button label="Save changes" icon="pi pi-check" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
