<p-dialog header="Edit fitness profile" [(visible)]="visible" [modal]="true" [style]="{ width: '40rem' }"
  [closable]="true">
  <div class="flex flex-col gap-4 pt-2">

    <div class="grid gap-4 sm:grid-cols-3">
      <div class="flex flex-col gap-2">
        <label for="fpHeight" class="text-sm font-medium">Height (cm)</label>
        <p-inputnumber inputId="fpHeight" [ngModel]="form().heightCm" (ngModelChange)="updateField('heightCm', $event)"
          placeholder="e.g. 175" [min]="0" [max]="300" fluid />
      </div>
      <div class="flex flex-col gap-2">
        <label for="fpWeight" class="text-sm font-medium">Weight (kg)</label>
        <p-inputnumber inputId="fpWeight" [ngModel]="form().weightKg" (ngModelChange)="updateField('weightKg', $event)"
          placeholder="e.g. 70" [min]="0" [max]="500" [minFractionDigits]="0" [maxFractionDigits]="1" fluid />
      </div>
      <div class="flex flex-col gap-2">
        <label for="fpFitness" class="text-sm font-medium">Fitness level</label>
        <p-select inputId="fpFitness" [options]="fitnessOptions" [ngModel]="form().fitnessLevel"
          (ngModelChange)="updateField('fitnessLevel', $event)" optionLabel="label" optionValue="value"
          placeholder="Select level" [showClear]="true" fluid />
      </div>
    </div>

    <p-divider />

    <h4 class="text-sm font-semibold m-0">Emergency contact</h4>
    <div class="grid gap-4 sm:grid-cols-2">
      <div class="flex flex-col gap-2">
        <label for="fpEmName" class="text-sm font-medium">Contact name</label>
        <input id="fpEmName" type="text" pInputText [ngModel]="form().emergencyContactName"
          (ngModelChange)="updateField('emergencyContactName', $event)" placeholder="Full name" />
      </div>
      <div class="flex flex-col gap-2">
        <label for="fpEmPhone" class="text-sm font-medium">Contact phone</label>
        <input id="fpEmPhone" type="tel" pInputText [ngModel]="form().emergencyContactPhone"
          (ngModelChange)="updateField('emergencyContactPhone', $event)" placeholder="Phone number" />
      </div>
    </div>

  </div>

  <ng-template #footer>
    <p-button label="Cancel" severity="secondary" [text]="true" (onClick)="visible.set(false)" />
    <p-button label="Save changes" icon="pi pi-check" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
