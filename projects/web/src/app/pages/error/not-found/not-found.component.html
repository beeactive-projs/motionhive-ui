<div class="error-page">
  <div class="honeycomb-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <bee-theme-toggle class="theme-toggle-btn"></bee-theme-toggle>

  <div class="error-content text-center">

    <a routerLink="/" class="brand-logo mb-12" aria-label="BeeActive home">
      <img src="svg/logo-navy.svg" alt="BeeActive logo" class="max-w-10">
      <span class="font-heading text-2xl font-extrabold tracking-tight">Bee Active</span>
    </a>

    <h1 class="text-4xl sm:text-6xl 3xl:text-8xl font-heading font-extrabold leading-[1.1] mb-6">
      4<span class="text-brand">0</span>4
    </h1>

    <h1 class="font-heading text-4xl sm:text-5xl font-extrabold leading-[1.1] mb-5">
      Off the beaten track.
    </h1>

    <p class="text-lg text-surface-600 dark:text-surface-400 leading-relaxed mb-10 max-w-sm mx-auto">
      This page doesn't exist — but your next workout does. Let's get you back on track.
    </p>

    <div class="flex flex-wrap justify-center gap-2 mb-10">
      <p-button routerLink="/auth/login" icon="pi pi-sign-in" label="Sign In">
      </p-button>
      <p-button routerLink="/auth/signup" icon="pi pi-user-plus" label="Sign Up">
      </p-button>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <p-button outlined label="Back to Homepage" icon="pi pi-home" (onClick)="goHome()" />
      <p-button outlined label="Go Back" icon="pi pi-arrow-left" (onClick)="goBack()" />
    </div>

  </div>
</div>
