<div class="error-page">
  <div class="honeycomb-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <bee-theme-toggle class="theme-toggle-btn"></bee-theme-toggle>

  <div class="error-content text-center">

    <a routerLink="/" class="brand-logo mb-12" aria-label="BeeActive home">
      <img src="svg/logo-navy.svg" alt="BeeActive logo" class="max-w-10">
      <span class="font-heading text-2xl font-extrabold tracking-tight">Bee Active</span>
    </a>

    <p class="text-4xl sm:text-6xl 3xl:text-8xl font-heading font-extrabold leading-[1.1] mb-6 text-brand">
      {{ errorCode() }}
    </p>

    <h1 class="font-heading text-4xl sm:text-5xl font-extrabold leading-[1.1] mb-5">
      {{ errorTitle() }}
    </h1>

    <p class="text-lg text-surface-600 dark:text-surface-400 leading-relaxed mb-10 max-w-sm mx-auto">
      {{ errorMessage() }}
    </p>

    <div class="flex flex-wrap justify-center gap-3 mb-10">
      <p-button label="Go Home" icon="pi pi-home" (onClick)="goHome()" />
      <p-button label="Try Again" icon="pi pi-refresh" (onClick)="retry()" />
      <p-button outlined label="Go Back" icon="pi pi-arrow-left" (onClick)="goBack()" />
    </div>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 text-sm text-surface-500">
      <div class="flex items-center gap-2">
        <i class="pi pi-clock"></i>
        <span>24/7 Support Available</span>
      </div>
      <span class="hidden sm:inline">·</span>
      <div class="flex items-center gap-2">
        <i class="pi pi-envelope"></i>
        <a href="mailto:support@beeactive.com"
          class="text-primary-600 dark:text-primary-400 hover:underline transition-colors">support.beeactive&#64;gmail.com</a>
      </div>
    </div>
  </div>
</div>
