<svg class="hx-svg" [attr.viewBox]="viewBox()" preserveAspectRatio="xMidYMid meet">
  <defs>
    <clipPath [attr.id]="clipId">
      <path [attr.d]="path()"></path>
    </clipPath>
    @if (resolved().gradient) {
      <linearGradient [attr.id]="gradId" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" [style.stop-color]="gradFrom"></stop>
        <stop offset="1" [style.stop-color]="gradTo"></stop>
      </linearGradient>
    }
    @if (showSheen()) {
      <linearGradient [attr.id]="sheenId" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"></stop>
        <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"></stop>
      </linearGradient>
    }
  </defs>

  @if (img()) {
    <image
      [attr.href]="img()"
      x="0"
      y="0"
      width="100"
      height="100"
      preserveAspectRatio="xMidYMid slice"
      [attr.clip-path]="clipUrl"
    ></image>
  } @else if (!hideBg()) {
    <path [attr.d]="path()" [style.fill]="bgFill()"></path>
  }

  @if (showSheen()) {
    <path [attr.d]="path()" [attr.fill]="'url(#' + sheenId + ')'"></path>
  }

  @if (hasRing()) {
    <path
      [attr.d]="path()"
      fill="none"
      stroke-linejoin="round"
      [style.stroke]="'var(--hx-ring)'"
      [attr.stroke-width]="resolved().ringW"
      [attr.stroke-dasharray]="dash() || null"
    ></path>
  }
</svg>

@if (!img()) {
  <span class="hx-content">
    @if (iconHtml()) {
      <svg
        class="hx-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        [style.width.px]="iconPx()"
        [style.height.px]="iconPx()"
        [innerHTML]="iconHtml()"
      ></svg>
    } @else if (label()) {
      <span class="hx-label" [style.font-size.px]="labelPx()">{{ label() }}</span>
    } @else {
      <ng-content></ng-content>
    }
  </span>
}

@if (status()) {
  <span class="hx-status" [class]="'hx-status--' + status()"></span>
}
