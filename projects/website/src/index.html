<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>MotionHive</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">

  <!-- Open Graph (static fallback — required for WhatsApp, Slack, and other non-JS crawlers) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://motionhive.fit/">
  <meta property="og:title" content="MotionHive">
  <meta property="og:description" content="Where active communities come together">
  <meta property="og:image" content="https://motionhive.fit/png/logo-bg-navy.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://motionhive.fit/png/logo-bg-navy.png">

  <!-- Default favicon (honey) - no media query so crawlers and all browsers pick these up -->
  <link rel="icon" type="image/x-icon" href="favicon-honey/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-honey/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-honey/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="png/logo-honey-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-honey/apple-touch-icon.png">
  <link rel="manifest" href="favicon-honey/site.webmanifest">

  <!-- Dark-mode override (navy) -->
  <link rel="icon" type="image/x-icon" href="favicon-navy/favicon.ico" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-navy/favicon-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-navy/favicon-16x16.png" media="(prefers-color-scheme: dark)">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet">

  <!-- Umami Analytics — replace placeholders after Railway deployment -->
  <!-- <script defer src="https://<YOUR_UMAMI_DOMAIN>/metrics.js" data-website-id="<YOUR_WEBSITE_ID>"></script> -->
</head>

<body>
  <app-root></app-root>
</body>

</html>
