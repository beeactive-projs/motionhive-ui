<h1 class="mb-2 text-2xl font-semibold text-[var(--p-text-color)]">Database</h1>
<p class="mb-4 text-sm text-[var(--p-text-muted-color)]">
  Read-only. Secret columns are redacted server-side.
</p>

<div class="mb-4 flex items-end gap-3">
  <div class="flex flex-col gap-1">
    <label class="text-xs text-[var(--p-text-muted-color)]">Table</label>
    <p-select
      [(ngModel)]="table"
      (onChange)="onTableChange()"
      [options]="tables()"
      optionLabel="label"
      optionValue="key"
      placeholder="Choose a table"
      appendTo="body"
      styleClass="w-64"
    >
      <ng-template let-t #item>
        <span>{{ t.label }} <span class="text-[var(--p-text-muted-color)]">({{ t.rows }})</span></span>
      </ng-template>
    </p-select>
  </div>
</div>

@if (selectedTable()) {
  <p-table
    [value]="data()"
    [lazy]="true"
    [paginator]="true"
    [rows]="rows"
    [totalRecords]="total()"
    [loading]="loading()"
    (onLazyLoad)="onLazyLoad($event)"
    size="small"
    [scrollable]="true"
    scrollHeight="60vh"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} rows"
  >
    <ng-template #header>
      <tr>
        @for (col of columns(); track col) {
          <th class="whitespace-nowrap">{{ col }}</th>
        }
      </tr>
    </ng-template>
    <ng-template #body let-row>
      <tr>
        @for (col of columns(); track col) {
          <td class="max-w-xs truncate" [title]="cell(row, col)">{{ cell(row, col) }}</td>
        }
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td [attr.colspan]="columns().length || 1" class="py-6 text-center text-[var(--p-text-muted-color)]">
          No rows.
        </td>
      </tr>
    </ng-template>
  </p-table>
}
