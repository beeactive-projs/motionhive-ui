<h1 class="mb-4 text-2xl font-semibold text-[var(--p-text-color)]">Audit log</h1>

<div class="mb-4 flex items-center gap-3">
  <input
    pInputText
    [(ngModel)]="action"
    (keyup.enter)="applyFilter()"
    placeholder="action filter (e.g. user.role.assign)"
    class="w-72"
  />
  <p-button label="Filter" icon="pi pi-filter" size="small" (onClick)="applyFilter()" />
</div>

<p-table
  [value]="items()"
  [lazy]="true"
  [paginator]="true"
  [rows]="rows"
  [totalRecords]="total()"
  [loading]="loading()"
  (onLazyLoad)="onLazyLoad($event)"
  size="small"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
>
  <ng-template #header>
    <tr>
      <th>When</th><th>Admin</th><th>Action</th><th>Target</th><th>Meta</th><th>IP</th>
    </tr>
  </ng-template>
  <ng-template #body let-row>
    <tr>
      <td class="whitespace-nowrap">{{ cell(row, 'createdAt') }}</td>
      <td>{{ cell(row, 'admin.email') }}</td>
      <td class="font-mono text-xs">{{ cell(row, 'action') }}</td>
      <td class="text-xs">{{ cell(row, 'targetType') }} {{ cell(row, 'targetId') }}</td>
      <td class="max-w-xs truncate text-xs" [title]="cell(row, 'meta')">{{ cell(row, 'meta') }}</td>
      <td class="text-xs">{{ cell(row, 'ip') }}</td>
    </tr>
  </ng-template>
  <ng-template #emptymessage>
    <tr><td colspan="6" class="py-6 text-center text-[var(--p-text-muted-color)]">No actions logged.</td></tr>
  </ng-template>
</p-table>
