<h1 class="mb-4 text-2xl font-semibold text-[var(--p-text-color)]">Domains</h1>

<div class="mb-4 flex flex-wrap items-center gap-3">
  <p-selectButton
    [(ngModel)]="resource"
    [options]="resourceOptions"
    optionLabel="label"
    optionValue="value"
    [allowEmpty]="false"
    (onChange)="onResourceChange()"
  />
  <input
    pInputText
    [(ngModel)]="q"
    (keyup.enter)="applySearch()"
    placeholder="search"
    class="w-56"
  />
  <p-button label="Search" icon="pi pi-search" size="small" (onClick)="applySearch()" />
</div>

<p-table
  [value]="items()"
  [lazy]="true"
  [paginator]="true"
  [rows]="rows"
  [totalRecords]="total()"
  [loading]="loading()"
  (onLazyLoad)="onLazyLoad($event)"
  size="small"
  [scrollable]="true"
  scrollHeight="60vh"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
>
  <ng-template #header>
    <tr>
      @for (col of columns; track col.path) {
        <th class="whitespace-nowrap">{{ col.label }}</th>
      }
      @if (isGroups() && canMutate()) {
        <th></th>
      }
    </tr>
  </ng-template>
  <ng-template #body let-row>
    <tr>
      @for (col of columns; track col.path) {
        <td class="max-w-xs truncate" [title]="cell(row, col.path)">{{ cell(row, col.path) }}</td>
      }
      @if (isGroups() && canMutate()) {
        <td class="text-right">
          <p-button
            label="Delete"
            severity="danger"
            size="small"
            [text]="true"
            (onClick)="confirmDeleteGroup(row)"
          />
        </td>
      }
    </tr>
  </ng-template>
  <ng-template #emptymessage>
    <tr>
      <td [attr.colspan]="columns.length + 1" class="py-6 text-center text-[var(--p-text-muted-color)]">
        No rows.
      </td>
    </tr>
  </ng-template>
</p-table>

<p-confirmDialog />
