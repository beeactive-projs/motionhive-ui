<h1 class="mb-6 text-2xl font-semibold text-[var(--p-text-color)]">Dashboard</h1>

@if (loading()) {
  <div class="text-[var(--p-text-muted-color)]">Loading…</div>
} @else {
  <div class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4">
    @for (kpi of kpis(); track kpi.label) {
      <div
        class="rounded-xl border bg-[var(--p-content-background)] p-4"
        [class.border-[var(--p-red-300)]]="kpi.alert"
        [class.border-[var(--p-content-border-color)]]="!kpi.alert"
      >
        <div class="text-sm text-[var(--p-text-muted-color)]">{{ kpi.label }}</div>
        <div
          class="mt-1 text-3xl font-semibold"
          [class.text-[var(--p-red-500)]]="kpi.alert"
          [class.text-[var(--p-text-color)]]="!kpi.alert"
        >
          {{ kpi.value }}
        </div>
        @if (kpi.sub) {
          <div class="mt-1 text-xs text-[var(--p-text-muted-color)]">{{ kpi.sub }}</div>
        }
      </div>
    }
  </div>
}
